# Backend: Switch to xrender for VM stability
backend = "xrender";
xrender-sync-fence = false;
detect-transient = false;
detect-client-leader = false;
unredir-if-possible = false;


# VSync: Disable to prevent lag on virtual drivers
# vsync = false;
vsync = false;

# Shadows: Keep simple or disable for performance
# shadow = true;
shadow = false;
# shadow-radius = 8;
# shadow-offset-x = -8;
# shadow-offset-y = -8;
# shadow-opacity = 0.6;
# shadow-exclude = [
#   "! name~=''",
#   "name *= 'picom'",
#   "name *= 'Firefox'",
#   "class_g = 'Conky'"
# ];

# Opacity
inactive-opacity = 1;
active-opacity = 1;
frame-opacity = 1;
detect-client-opacity = false;
inactive-opacity-override = false;

# Explicit rules for Alacritty
opacity-rule = [
  # "85:class_g *?= 'Alacritty'"
  # "100:class_g = 'Alacritty' && focused",
  "85:class_g = 'Alacritty' && focused",
  "85:class_g = 'Alacritty' && !focused"
];

# Fading (Optional - disable if still laggy)
# fading = true;
fading = false;
# fade-delta = 4;
# fade-in-step = 0.04;
# fade-out-step = 0.04;

# Other
focus-exclude = [ "x = 0 && y = 0 && override_redirect = true" ];
use-damage = false;

# Window Types
wintypes: {
  tooltip = { fade = false; shadow = false; opacity = 0.8; focus = true; };
  dock = { shadow = false; };
  dnd = { shadow = false; };
  dropdown_menu = { shadow = false; opacity = 0.9; };
  popup_menu = { shadow = false; opacity = 0.9; };
  utility = { shadow = false; };
};
